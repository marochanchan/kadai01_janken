<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<script src="js/jquery-2.1.3.min.js"></script>
<link rel="stylesheet" href="css/sample.css">
<title>じゃんけん</title>
</head>
<body>

<header>
  <h1>最初はグー！じゃんけん…</h1>
</header>

<main>
  <ul>
    <!-- <li id="gu_btn">グー</li> -->
    <li id="gu_btn"><img src="./img/janken_gu.png" alt=""></li>
    <li id="cho_btn"><img src="./img/janken_choki.png" alt=""></li>
    <li id="par_btn"><img src="./img/janken_pa.png" alt=""></li>
  </ul>
  <div>対戦相手「<span id="pc_hands">最初はグー！</span>」</div>
  <div id="judgment"></div>
</main>

<footer></footer>
<script>
//じゃんけん用のSCRIPTを書いてください

// グーをクリックしたときのイベント
$("#gu_btn").on("click",function(){
    const r = Math.ceil(Math.random()*3); //1~3
    console.log(r);
    if(r == 1){
      // $("#pc_hands").html("グー");
      $("#pc_hands").html('<img src="img/janken_gu.png" alt="グー">');
      $("#judgment").html("あいこ");
    }

    if(r == 2){
      // $("#pc_hands").html("チョキ");
      $("#pc_hands").html('<img src="img/janken_choki.png" alt="チョキ">');
      $("#judgment").html("あなたの勝ち");
    }

    if(r == 3){
      // $("#pc_hands").html("パー");
      $("#pc_hands").html('<img src="img/janken_pa.png" alt="パー">');
      $("#judgment").html("あなたの負け");
    }
});

});
